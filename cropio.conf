# /etc/deploy/sites/cropio.conf — Cropio site configuration
# Created by deploy.sh — compatible with shared deploy infrastructure

# ── Identity ─────────────────────────────────────────────────────────────
DOMAIN="cropio.whoisdhruv.com"
SERVICE_NAME="cropio"
NEXTJS_PORT=3001

# ── Repository Paths ─────────────────────────────────────────────────────
GIT_ROOT="/home/ubuntu/cropioWebsite"
PROJECT_ROOT="/home/ubuntu/cropioWebsite"

# ── Git ──────────────────────────────────────────────────────────────────
GIT_BRANCH="master"
GIT_REMOTE="origin"

# ── SSL (reuse wildcard *.whoisdhruv.com cert from portfolio) ─────────────
SSL_CERT="/etc/ssl/cloudflare/whoisdhruv.com.pem"
SSL_KEY="/etc/ssl/cloudflare/whoisdhruv.com.key"

# ── Nginx ────────────────────────────────────────────────────────────────
NGINX_CONF_TEMPLATE="nginx-cloudflare.conf"

# ── Required Environment Variables ───────────────────────────────────────
REQUIRED_ENV_VARS="NVIDIA_VISION_API_KEY,NVIDIA_EMBED_API_KEY"

# ── Backups & Logs ───────────────────────────────────────────────────────
BACKUP_RETENTION_DAYS=7
MAX_LOG_FILES=10
