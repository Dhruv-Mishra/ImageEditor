# ═══════════════════════════════════════════════════════════════════
#  Cropio — Nginx reverse-proxy with Cloudflare Origin SSL
#
#  Template placeholders (replaced by deploy script):
#    __DOMAIN__         → cropio.whoisdhruv.com
#    __NEXTJS_PORT__    → 3001
#    __SERVICE_NAME__   → cropio
#    __SSL_CERT__       → /etc/ssl/cloudflare/whoisdhruv.com.pem  (wildcard, shared)
#    __SSL_KEY__        → /etc/ssl/cloudflare/whoisdhruv.com.key  (wildcard, shared)
# ═══════════════════════════════════════════════════════════════════

# ── Upstreams ──────────────────────────────────────────────────────

upstream __SERVICE_NAME___backend {
    server 127.0.0.1:__NEXTJS_PORT__;
    keepalive 8;
}

upstream __SERVICE_NAME___api_backend {
    server 127.0.0.1:8000;
    keepalive 4;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__ www.__DOMAIN__;
    return 301 https://__DOMAIN__$request_uri;
}

# ── www → apex redirect (HTTPS) ───────────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.__DOMAIN__;

    ssl_certificate     __SSL_CERT__;
    ssl_certificate_key __SSL_KEY__;

    return 301 https://__DOMAIN__$request_uri;
}

# ── Main HTTPS server ─────────────────────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __DOMAIN__;

    # ── SSL (Cloudflare Origin Certificate) ──
    ssl_certificate     __SSL_CERT__;
    ssl_certificate_key __SSL_KEY__;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:__SERVICE_NAME___SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ──
    add_header X-Content-Type-Options  "nosniff" always;
    add_header X-Frame-Options         "DENY" always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self';" always;

    # ── Upload size limit (image uploads ≤10 MB + overhead) ──
    client_max_body_size 12M;

    # ── Python backend: crop-suggest (YOLO inference) ──
    location = /api/crop-suggest {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://__SERVICE_NAME___api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection       '';
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache off;
        proxy_read_timeout 60s;
        client_max_body_size 12M;
    }

    # ── Python backend: health check ──
    location = /api/health {
        proxy_pass http://__SERVICE_NAME___api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host       $host;
        proxy_cache off;
        access_log off;
    }

    # ── Next.js API routes (describe, embed, etc.) ──
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://__SERVICE_NAME___backend;
        proxy_http_version 1.1;
        proxy_set_header Connection       '';
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache off;
    }

    # ── Next.js static chunks — immutable ──
    location /_next/static/ {
        proxy_pass http://__SERVICE_NAME___backend;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Public static assets (images, manifest, etc.) ──
    location /images/ {
        proxy_pass http://__SERVICE_NAME___backend;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Everything else → Next.js ──
    location / {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://__SERVICE_NAME___backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade          $http_upgrade;
        proxy_set_header Connection       'upgrade';
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
